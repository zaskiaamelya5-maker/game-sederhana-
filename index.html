<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tangkap Bola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            text-align: center;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 28px;
        }

        #score {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 10px;
        }

        #canvas {
            background-color: #16213e;
            border: 3px solid #e94560;
            border-radius: 10px;
            display: block;
        }

        #startBtn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #startBtn:hover {
            background-color: #c73652;
        }

        #gameOver {
            display: none;
            color: #e94560;
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
