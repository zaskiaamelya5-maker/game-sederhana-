<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tangkap Bola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #score {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #canvas {
            background-color: #16213e;
            border: 3px solid #e94560;
            border-radius: 10px;
            touch-action: none;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .btn-control {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #0f3460;
            color: white;
            border: 2px solid #e94560;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
        }

        .btn-control:active {
            background-color: #e94560;
        }

        #startBtn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #gameOver {
            display: none;
            color: #e94560;
            font-size: 20px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎮 Tangkap Bola!</h1>
    <div id="score">Skor: 0</div>
    <canvas id="canvas" width="350" height="400"></canvas>
    <div id="gameOver">
        ❌ Game Over!<br>
        Skor akhir: <span id="finalScore"></span>
    </div>
    <button id="startBtn" onclick="startGame()">▶ Mulai Game</button>

    <!-- Tombol kontrol untuk HP -->
    <div class="controls">
        <button class="btn-control" id="btnKiri">⬅️</button>
        <button class="btn-control" id="btnKanan">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let lives = 3;
        let animationId;
        let frameCount = 0;
        let balls = [];

        // Keranjang
        const basket = {
            x: 135,
            y: 375,
            width: 80,
            height: 15,
            speed: 10,
            color: '#e94560',
            movingLeft: false,
            movingRight: false
        };

        // Kontrol Keyboard (untuk PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') basket.movingLeft = true;
            if (e.key === 'ArrowRight') basket.movingRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') basket.movingLeft = false;
            if (e.key === 'ArrowRight') basket.movingRight = false;
        });

        // Kontrol Tombol HP
        const btnKiri = document.getElementById('btnKiri');
        const btnKanan = document.getElementById('btnKanan');

        btnKiri.addEventListener('touchstart', () => basket.movingLeft = true);
        btnKiri.addEventListener('touchend', () => basket.movingLeft = false);
        btnKanan.addEventListener('touchstart', () => basket.movingRight = true);
        btnKanan.addEventListener('touchend', () => basket.movingRight = false);

        // Kontrol Swipe / Sentuh Canvas
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            basket.x = touchX - basket.width / 2;

            // Batas kiri dan kanan
            if (basket.x < 0) basket.x = 0;
            if (basket.x + basket.width > canvas.width) {
                basket.x = canvas.width - basket.width;
            }
        });

        // Buat bola baru
        function createBall() {
            balls.push({
                x: Math.random() * 320 + 15,
                y: 0,
                radius: 15,
                speed: Math.random() * 2 + 2,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`
            });
        }

        // Update game
        function update() {
            // Gerakkan keranjang
            if (basket.movingLeft && basket.x > 0) {
                basket.x -= basket.speed;
            }
            if (basket.movingRight && basket.x + basket.width < canvas.width) {
                basket.x += basket.speed;
            }

            // Update bola
            balls.forEach((ball, index) => {
                ball.y += ball.speed;

                // Bola tertangkap
                if (
                    ball.y + ball.radius >= basket.y &&
                    ball.x >= basket.x &&
                    ball.x <= basket.x + basket.width
                ) {
                    score++;
                    document.getElementById('score').textContent = `Skor: ${score}`;
                    balls.splice(index, 1);
                }

                // Bola jatuh
                if (ball.y > canvas.height) {
                    balls.splice(index, 1);
                    lives--;
                    if (lives <= 0) endGame();
                }
            });
        }

        // Gambar game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar keranjang
            ctx.fillStyle = basket.color;
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 5);
            ctx.fill();

            // Gambar bola
            balls.forEach(ball => {
                ctx.fillStyle = ball.color;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Tampilkan nyawa
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Arial';
            ctx.fillText(`❤️ ${lives}`, 10, 25);
        }

        // Loop utama
        function gameLoop() {
            frameCount++;
            if (frameCount % 60 === 0) createBall();
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Mulai game
        function startGame() {
            score = 0;
            lives = 3;
            balls = [];
            frameCount = 0;
            basket.x = 135;

            document.getElementById('score').textContent = 'Skor: 0';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = '🔄 Restart';

            cancelAnimationFrame(animationId);
            gameLoop();
        }

        // Game over
        function endGame() {
            cancelAnimationFrame(animationId);
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
        }
    </script>
</body>
</html>
